<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPLES Cube Solver</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* fills viewport edge-to-edge on mobile; 56px = 2×8 body-padding + 2×11 strip+gap + 2×7 face-chrome + 4 gap */
      --cell: calc((100vw - 56px) / 2);
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 16px 8px 40px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #ffffff;
      text-align: center;
    }

    #instructions {
      width: 100%;
      max-width: 460px;
      background: #16213e;
      border: 1px solid #2e2e5a;
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 0.9rem;
      color: #aaaacc;
      line-height: 1.65;
      text-align: center;
    }

    #instructions strong {
      color: #90caf9;
    }

    #cube-net {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .face-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .face-section.active {
      display: flex;
    }

    .face-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #8888aa;
      text-transform: uppercase;
    }

    .face {
      display: grid;
      grid-template-columns: repeat(2, var(--cell));
      grid-template-rows: repeat(2, var(--cell));
      gap: 4px;
      padding: 6px;
      background: #12122a;
      border-radius: 8px;
      border: 1px solid #33335a;
    }

    .facelet {
      width: var(--cell);
      height: var(--cell);
      background: #2e2e4a;
      border: 2px solid #555580;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .facelet:hover:not(.logo-locked) {
      border-color: #aaaacc;
      transform: scale(1.05);
    }

    .facelet.logo-locked {
      background: #ffffff !important;
      border-color: #dddddd !important;
      cursor: not-allowed;
    }

    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #color-counts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .count-badge {
      padding: 4px 10px;
      border-radius: 14px;
      font-size: 0.78rem;
      font-weight: 600;
      background: #2e2e4a;
      color: #e0e0e0;
    }

    .count-badge.complete {
      background: #1a5c2a;
      color: #90ee90;
    }

    #btn-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    #solve-btn {
      padding: 12px 44px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #solve-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #solve-btn:not(:disabled):hover {
      background: #357abd;
    }

    #reset-btn {
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #3a2a2a;
      color: #cc8888;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset-btn:hover {
      background: #5a2a2a;
    }

    #status-msg {
      min-height: 1.2em;
      font-size: 0.9rem;
      color: #ff8080;
      text-align: center;
      max-width: 380px;
    }

    #solution-section {
      width: 100%;
      max-width: 460px;
      background: #16213e;
      border: 1px solid #2e2e5a;
      border-radius: 12px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #solution-section:not([hidden]) {
      display: flex;
    }

    #solution-header {
      font-size: 1rem;
      font-weight: 600;
      color: #90caf9;
      text-align: center;
    }

    #step-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    #step-face-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.04em;
    }

    #step-visual {
      display: flex;
      justify-content: center;
    }

    #step-visual svg {
      width: min(280px, calc(100vw - 48px));
      height: auto;
    }

    #step-instruction {
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffd700;
      text-align: center;
    }

    #solution-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    #solution-nav button {
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: #2e2e4a;
      color: #e0e0e0;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      min-width: 90px;
    }

    #solution-nav button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #solution-nav button:not(:disabled):hover {
      background: #4a4a6a;
    }

    #step-indicator {
      font-size: 0.9rem;
      color: #aaaacc;
      text-align: center;
      flex: 1;
    }

    /* Desktop/tablet: lock to compact fixed-cell layout */
    @media (min-width: 500px) {
      :root { --cell: 80px; }
      body { padding: 24px 16px 48px; gap: 20px; }
      #solution-section { padding: 24px 20px; }
    }

    /* Tiny phones: font size relief */
    @media (max-width: 360px) {
      h1 { font-size: 1.3rem; }
      #step-face-name { font-size: 1.2rem; }
      #step-instruction { font-size: 1rem; }
    }

    /* Context border strips for Top/Bottom faces */
    .face-ctx-wrap {
      position: relative;
      margin-top: 14px; /* clearance for the absolute-positioned top strip */
    }

    .ctx-strip {
      position: absolute;
      display: flex;
      gap: 4px;
    }

    .ctx-cell {
      background: #2e2e4a;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .ctx-strip-h {
      flex-direction: row;
      height: 8px;
      left: 7px;
      width: calc(var(--cell) * 2 + 4px);
    }

    .ctx-strip-h .ctx-cell {
      width: var(--cell);
      height: 8px;
    }

    .ctx-strip-top {
      bottom: calc(100% + 3px);
    }

    .ctx-strip-bot {
      top: calc(100% + 3px);
    }

    .ctx-strip-v {
      flex-direction: column;
      width: 8px;
      top: 7px;
      height: calc(var(--cell) * 2 + 4px);
    }

    .ctx-strip-v .ctx-cell {
      height: var(--cell);
      width: 8px;
    }

    .ctx-strip-left {
      right: calc(100% + 3px);
    }

    .ctx-strip-right {
      left: calc(100% + 3px);
    }

    #step-prefix {
      font-size: 0.82rem;
      color: #8888aa;
      text-align: center;
    }

    #face-section-SOL {
      gap: 14px;
    }

    #face-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      max-width: 460px;
    }

    #face-nav button {
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: #2e2e4a;
      color: #e0e0e0;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      min-width: 90px;
    }

    #face-nav button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #face-nav button:not(:disabled):hover {
      background: #4a4a6a;
    }

    #btn-face-next.solve-mode {
      background: #4a90e2;
      color: #fff;
    }

    #btn-face-next.solve-mode:not(:disabled):hover {
      background: #357abd;
    }

    #face-indicator {
      flex: 1;
      font-size: 0.9rem;
      color: #aaaacc;
      text-align: center;
    }

    /* =========================================================
       COLOR DRUM PICKER
       ========================================================= */
    #color-drum-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
    }

    #color-drum-overlay.active { display: block; }

    #color-drum-strip {
      position: absolute;
      pointer-events: none;
    }

    .drum-circle {
      position: absolute;
      left: 0;
      top: 0;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      will-change: transform, opacity;
    }

    .facelet.lp-pending {
      animation: lp-ring 380ms ease-out forwards;
    }

    @keyframes lp-ring {
      from { box-shadow: 0 0 0 0   rgba(255,255,255,0.6); }
      to   { box-shadow: 0 0 0 5px rgba(255,255,255,0.0); }
    }
  </style>
</head>
<body>
  <div id="color-drum-overlay"><div id="color-drum-strip"></div></div>

  <h1>FPLES Cube Solver</h1>

  <div id="instructions"></div>

  <!--
    Worker script — solver table builder.

    Generator moves are R, D, B.  These three face moves all leave the UFL corner
    (position 1) unmoved, so UFL is the fixed reference corner that anchors the
    coordinate system.  The user is told to hold the cube with the white logo at
    front-top-left, which is exactly the UFL position.

    Twist coordinate: encode co[0,2,3,4,5,6] (6 values, skip UFL=1, derive co[7]
    from the sum-divisible-by-3 constraint).  Range 0–728.

    Perm coordinate: Lehmer code over cp at positions [0,2,3,4,5,6,7] (7 values,
    cp[1]=1 always fixed).  Range 0–5039.
  -->
  <script id="solver-worker" type="javascript/worker">
    const URF = 0, UFL = 1, ULB = 2, UBR = 3;
    const DRB = 4, DFR = 5, DLF = 6, DBL = 7;

    // R CW: cycles URF→UBR→DRB→DFR  (fixes UFL ✓)
    const cpR = [DFR, UFL, ULB, URF, UBR, DRB, DLF, DBL];
    const coR = [  2,   0,   0,   1,   2,   1,   0,   0];

    // D CW: cycles DFR→DRB→DBL→DLF  (fixes all U corners including UFL ✓)
    const cpD = [URF, UFL, ULB, UBR, DFR, DLF, DBL, DRB];
    const coD = [  0,   0,   0,   0,   0,   0,   0,   0];

    // B CW: cycles UBR→ULB→DBL→DRB  (fixes UFL ✓)
    const cpB = [URF, UFL, UBR, DRB, DBL, DFR, DLF, ULB];
    const coB = [  0,   0,   1,   2,   1,   0,   0,   2];

    const ID_CP = [0, 1, 2, 3, 4, 5, 6, 7];
    const ID_CO = [0, 0, 0, 0, 0, 0, 0, 0];
    const FACT  = [1, 1, 2, 6, 24, 120, 720, 5040];

    // Positions encoded in the perm coordinate (all except UFL=1)
    const PERM_POS = [0, 2, 3, 4, 5, 6, 7];

    function applyMove(cpA, coA, cpM, coM) {
      const cpOut = new Array(8), coOut = new Array(8);
      for (let i = 0; i < 8; i++) {
        cpOut[i] = cpA[cpM[i]];
        coOut[i] = (coA[cpM[i]] + coM[i]) % 3;
      }
      return { cp: cpOut, co: coOut };
    }

    function buildMoves() {
      const moves = [];
      for (const [cpBase, coBase] of [[cpR, coR], [cpD, coD], [cpB, coB]]) {
        let cur = { cp: ID_CP.slice(), co: ID_CO.slice() };
        for (let pow = 0; pow < 3; pow++) {
          cur = applyMove(cur.cp, cur.co, cpBase, coBase);
          moves.push({ cp: cur.cp.slice(), co: cur.co.slice() });
        }
      }
      return moves;  // R R2 R'  D D2 D'  B B2 B'
    }

    // Encode co[0,2,3,4,5,6] as base-3; skip position 1 (UFL fixed); derive co[7]
    function encodeTwist(co) {
      let twist = 0;
      for (let i = 0; i < 7; i++) {
        if (i === 1) continue;
        twist = twist * 3 + co[i];
      }
      return twist;
    }

    function decodeTwist(twist, co) {
      co[1] = 0;
      let t = twist, sum = 0;
      // Decode in reverse order: positions 6,5,4,3,2,0
      const order = [6, 5, 4, 3, 2, 0];
      for (let j = 0; j < order.length; j++) {
        co[order[j]] = t % 3;
        sum += co[order[j]];
        t = Math.floor(t / 3);
      }
      co[7] = (3 - (sum % 3)) % 3;
    }

    // Lehmer code over PERM_POS positions (skips UFL=1, cp[1]=1 always)
    function encodePerm(cp) {
      let perm = 0;
      for (let i = 0; i < 6; i++) {
        let k = 0;
        for (let j = i + 1; j < 7; j++) {
          if (cp[PERM_POS[j]] < cp[PERM_POS[i]]) k++;
        }
        perm += k * FACT[6 - i];
      }
      return perm;
    }

    function decodePerm(perm, cp) {
      cp[1] = 1;
      const used = new Array(8).fill(false);
      used[1] = true;
      let p = perm;
      for (let i = 0; i < 6; i++) {
        const fact = FACT[6 - i], k = Math.floor(p / fact);
        p = p % fact;
        let count = 0;
        for (let c = 0; c < 8; c++) {
          if (!used[c]) { if (count === k) { cp[PERM_POS[i]] = c; used[c] = true; break; } count++; }
        }
      }
      for (let c = 0; c < 8; c++) { if (!used[c]) { cp[PERM_POS[6]] = c; break; } }
    }

    function buildTwistMove(MOVES) {
      const table = new Uint16Array(729 * 9);
      const co = new Array(8), cp = [0, 1, 2, 3, 4, 5, 6, 7];
      for (let twist = 0; twist < 729; twist++) {
        decodeTwist(twist, co);
        for (let m = 0; m < 9; m++)
          table[twist * 9 + m] = encodeTwist(applyMove(cp, co, MOVES[m].cp, MOVES[m].co).co);
      }
      return table;
    }

    function buildPermMove(MOVES) {
      const table = new Uint16Array(5040 * 9);
      const cp = new Array(8), co = [0, 0, 0, 0, 0, 0, 0, 0];
      for (let perm = 0; perm < 5040; perm++) {
        decodePerm(perm, cp);
        for (let m = 0; m < 9; m++)
          table[perm * 9 + m] = encodePerm(applyMove(cp, co, MOVES[m].cp, MOVES[m].co).cp);
      }
      return table;
    }

    function buildPruningTable(twistMove, permMove) {
      const table = new Uint8Array(5040 * 729).fill(255);
      table[0] = 0;
      let depth = 0, filled = 1;
      const total = 5040 * 729;
      while (filled < total) {
        for (let perm = 0; perm < 5040; perm++) {
          for (let twist = 0; twist < 729; twist++) {
            if (table[perm * 729 + twist] !== depth) continue;
            for (let m = 0; m < 9; m++) {
              const idx = permMove[perm * 9 + m] * 729 + twistMove[twist * 9 + m];
              if (table[idx] === 255) { table[idx] = depth + 1; filled++; }
            }
          }
        }
        depth++;
        self.postMessage({ type: 'progress', pct: Math.round(5 + (filled / total) * 95) });
      }
      return table;
    }

    self.onmessage = function () {
      const MOVES        = buildMoves();
      const twistMove    = buildTwistMove(MOVES);
      self.postMessage({ type: 'progress', pct: 2 });
      const permMove     = buildPermMove(MOVES);
      self.postMessage({ type: 'progress', pct: 5 });
      const pruningTable = buildPruningTable(twistMove, permMove);
      self.postMessage(
        { type: 'done', twistMove, permMove, pruningTable },
        [twistMove.buffer, permMove.buffer, pruningTable.buffer]
      );

    const MOVE_DESCS = [

      '2 Turns',                  // D 180°
      'Counter-Clockwise 1 Turn', // D CCW

    // =========================================================================

    // R CW: cycles URF→UBR→DRB→DFR
    const cpR = [DFR, UFL, ULB, URF, UBR, DRB, DLF, DBL];
    const coR = [  2,   0,   0,   1,   2,   1,   0,   0];

    // D CW: cycles DFR→DRB→DBL→DLF
    const cpD = [URF, UFL, ULB, UBR, DFR, DLF, DBL, DRB];
    const coD = [  0,   0,   0,   0,   0,   0,   0,   0];

    // B CW: cycles UBR→ULB→DBL→DRB
    const cpB = [URF, UFL, UBR, DRB, DBL, DFR, DLF, ULB];
    const coB = [  0,   0,   1,   2,   1,   0,   0,   2];

    const ID_CP = [0, 1, 2, 3, 4, 5, 6, 7];
    const ID_CO = [0, 0, 0, 0, 0, 0, 0, 0];
    const FACT  = [1, 1, 2, 6, 24, 120, 720, 5040];

    // Positions in the perm coordinate (all except UFL=position 1)
    const PERM_POS = [0, 2, 3, 4, 5, 6, 7];

    function applyMove(cpA, coA, cpM, coM) {
      const cpOut = new Array(8), coOut = new Array(8);
      for (let i = 0; i < 8; i++) {
        cpOut[i] = cpA[cpM[i]];
        coOut[i] = (coA[cpM[i]] + coM[i]) % 3;
      }
      return { cp: cpOut, co: coOut };
    }

    function buildMoves() {
      const moves = [];
      for (const [cpBase, coBase] of [[cpR, coR], [cpD, coD], [cpB, coB]]) {
        let cur = { cp: ID_CP.slice(), co: ID_CO.slice() };
        for (let pow = 0; pow < 3; pow++) {
          cur = applyMove(cur.cp, cur.co, cpBase, coBase);
          moves.push({ cp: cur.cp.slice(), co: cur.co.slice() });

    // Twist: encode co[0,2,3,4,5,6] (skip position 1); derive co[7] from sum
    function encodeTwist(co) {
      let twist = 0;
      for (let i = 0; i < 7; i++) {
        if (i === 1) continue;
        twist = twist * 3 + co[i];
      }
      return twist;

    function decodeTwist(twist, co) {
      co[1] = 0;
      let t = twist, sum = 0;
      const order = [6, 5, 4, 3, 2, 0];
      for (let j = 0; j < order.length; j++) {
        co[order[j]] = t % 3;
        sum += co[order[j]];
        t = Math.floor(t / 3);

      co[7] = (3 - (sum % 3)) % 3;

    // Perm: Lehmer code over PERM_POS; cp[1]=1 always
    function encodePerm(cp) {
      let perm = 0;
      for (let i = 0; i < 6; i++) {
        let k = 0;
        for (let j = i + 1; j < 7; j++) {
          if (cp[PERM_POS[j]] < cp[PERM_POS[i]]) k++;

      return perm;
    }

    function decodePerm(perm, cp) {
      cp[1] = 1;
      const used = new Array(8).fill(false);
      used[1] = true;
      let p = perm;
      for (let i = 0; i < 6; i++) {
        const fact = FACT[6 - i], k = Math.floor(p / fact);
        p = p % fact;
        let count = 0;
        for (let c = 0; c < 8; c++) {

        }

      for (let c = 0; c < 8; c++) { if (!used[c]) { cp[PERM_POS[6]] = c; break; } }
    }

    // =========================================================================
    // MOVE TABLES  (main-thread copies — used by GAS version; worker builds its own)
    // =========================================================================

    function buildTwistMove() {
      const table = new Uint16Array(729 * 9);
      const co = new Array(8), cp = [0, 1, 2, 3, 4, 5, 6, 7];
      for (let twist = 0; twist < 729; twist++) {
        decodeTwist(twist, co);
        for (let m = 0; m < 9; m++)

    function buildPermMove() {
      const table = new Uint16Array(5040 * 9);
      const cp = new Array(8), co = [0, 0, 0, 0, 0, 0, 0, 0];
      for (let perm = 0; perm < 5040; perm++) {

    // =========================================================================

    function search(twist, perm, depth, lastFace, moves) {
      if (pruningTable[perm * 729 + twist] > depth) return false;
      if (depth === 0) return twist === 0 && perm === 0;
      for (let m = 0; m < 9; m++) {
        const face = Math.floor(m / 3);
        if (face === lastFace) continue;
        const newTwist = twistMove[twist * 9 + m];
        const newPerm  = permMove[perm  * 9 + m];
        moves.push(m);
        if (search(newTwist, newPerm, depth - 1, face, moves)) return true;
        moves.pop();
      }
      return false;
    }

    function solve(cp, co) {
      const twist = encodeTwist(co), perm = encodePerm(cp);
      if (twist === 0 && perm === 0) return [];
      const moves = [];
      for (let maxDepth = 1; maxDepth <= 20; maxDepth++) {
        if (search(twist, perm, maxDepth, -1, moves)) return moves;
      }
      return null;
    }

        for (let c = 0; c < 8; c++) {
          if (CORNER_COLORS[c].every(col => stickers.includes(col))) { cubie = c; break; }

        cp[pos] = cubie;
        if (cubie === -1) { co[pos] = 0; continue; }
        co[pos] = stickers.indexOf(CORNER_COLORS[cubie][0]);

      return { cp, co };

    const drumOverlay = document.getElementById('color-drum-overlay');
    const drumStrip   = document.getElementById('color-drum-strip');

    const drumCircles = [];
    for (let i = 0; i <= DRUM_SLOTS * 2; i++) {
      const c = document.createElement('div');
      c.className = 'drum-circle';
      drumStrip.appendChild(c);
      drumCircles.push(c);
    }

    let drumActive    = false;
    let drumCell      = null;
    let drumCellIdx   = -1;
    let drumRawOffset = 0;
    let drumStartOff  = 0;
    let drumDragY     = 0;
    let drumAnimRaf   = null;
    let lpTimer       = null;
    let lpCell        = null;
    let lpPointerId   = null;
    let lpStartX      = 0;
    let lpStartY      = 0;

    function renderDrum(rawOffset) {
      const snapped = Math.round(rawOffset);
      drumCircles.forEach((circle, i) => {
        const slot     = i - DRUM_SLOTS;
        const vPos     = snapped + slot;
        const colorIdx = ((vPos % 6) + 6) % 6;
        const dist     = vPos - rawOffset;
        const absDist  = Math.abs(dist);
        const scale    = Math.max(0.15, 1 - absDist * 0.28);
        const opacity  = Math.max(0.08, 1 - absDist * 0.40);
        const isCenter = absDist < 0.5;
        circle.style.background  = COLOR_CSS[colorIdx];
        circle.style.transform   = `translate(-50%,-50%) translateY(${dist * DRUM_STEP}px) scale(${scale})`;
        circle.style.opacity     = opacity;
        circle.style.zIndex      = Math.round(10 - absDist * 3);
        circle.style.borderColor = isCenter ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.18)';
        circle.style.boxShadow   = isCenter
          ? '0 0 0 3px rgba(255,255,255,0.22), 0 4px 16px rgba(0,0,0,0.55)'
          : '0 2px 6px rgba(0,0,0,0.30)';
      });
    }

    function activateDrum(cell, startY) {
      drumActive    = true;
      drumCell      = cell;
      drumCellIdx   = parseInt(cell.dataset.index);
      const cur     = facelets[drumCellIdx];
      drumRawOffset = cur === -1 ? 0 : cur;
      drumStartOff  = drumRawOffset;
      drumDragY     = startY;
      const rect    = cell.getBoundingClientRect();
      drumStrip.style.left = (rect.left + rect.width  / 2) + 'px';
      drumStrip.style.top  = (rect.top  + rect.height / 2) + 'px';
      drumOverlay.classList.add('active');
      renderDrum(drumRawOffset);
      if (navigator.vibrate) navigator.vibrate(25);
    }

    function updateDrum(clientY) {
      drumRawOffset = drumStartOff + (drumDragY - clientY) / DRUM_STEP;
      renderDrum(drumRawOffset);
    }

    function snapAndCommit() {
      const from   = drumRawOffset;
      const to     = Math.round(from);
      const finalC = ((to % 6) + 6) % 6;
      cancelAnimationFrame(drumAnimRaf);
      const t0 = performance.now();
      (function frame(now) {
        const p     = Math.min(1, (now - t0) / 160);
        const eased = 1 - Math.pow(1 - p, 3);
        renderDrum(from + (to - from) * eased);
        if (p < 1) { drumAnimRaf = requestAnimationFrame(frame); return; }
        facelets[drumCellIdx]      = finalC;
        drumCell.style.background  = COLOR_CSS[finalC];
        drumCell.style.borderColor = COLOR_CSS[finalC];
        updateCounts();
        closeDrum();
      })(t0);
    }

    function closeDrum() {
      drumActive  = false;
      drumCell    = null;
      drumCellIdx = -1;
      drumOverlay.classList.remove('active');
      cancelAnimationFrame(drumAnimRaf);
    }

    function cancelLP() {
      clearTimeout(lpTimer);
      lpTimer = null;
      if (lpCell) { lpCell.classList.remove('lp-pending'); lpCell = null; }
    }

    document.querySelectorAll('.facelet').forEach(cell => {
      cell.addEventListener('pointerdown', e => {
        if (parseInt(cell.dataset.index) === LOGO_FACELET) return;
        if (lpTimer || drumActive) return;
        e.preventDefault();
        lpCell      = cell;
        lpPointerId = e.pointerId;
        lpStartX    = e.clientX;
        lpStartY    = e.clientY;
        cell.classList.add('lp-pending');
        lpTimer = setTimeout(() => {
          lpCell = null;
          cell.classList.remove('lp-pending');
          activateDrum(cell, lpStartY);
        }, LONG_PRESS_MS);
      }, { passive: false });
    });

    document.addEventListener('pointermove', e => {
      if (drumActive) {
        if (e.pointerId === lpPointerId) { e.preventDefault(); updateDrum(e.clientY); }
        return;
      }
      if (e.pointerId !== lpPointerId || !lpTimer) return;
      const dx = e.clientX - lpStartX, dy = e.clientY - lpStartY;
      if (dx * dx + dy * dy > 100) cancelLP();
    }, { passive: false });

    document.addEventListener('pointerup', e => {
      if (e.pointerId !== lpPointerId) return;
      const wasShortTap = !!lpCell;
      const tappedCell  = lpCell;
      cancelLP();
      if (drumActive) {
        snapAndCommit();
      } else if (wasShortTap && tappedCell) {
        const idx  = parseInt(tappedCell.dataset.index);
        const cur  = facelets[idx];
        const next = cur === -1 ? 0 : (cur + 1) % 6;
        facelets[idx] = next;
        tappedCell.style.background  = COLOR_CSS[next];
        tappedCell.style.borderColor = COLOR_CSS[next];
        updateCounts();
      }
    });

    document.addEventListener('pointercancel', e => {
      if (e.pointerId !== lpPointerId) return;
      cancelLP();
      if (drumActive) closeDrum();
    });

    document.addEventListener('contextmenu', e => {
      if (lpTimer || drumActive) e.preventDefault();
    });

    // =========================================================================
    // COLOR COUNTS + SOLVE BUTTON
    // =========================================================================

    function updateCounts() {
      const counts = new Array(6).fill(0);
      for (const c of facelets) { if (c !== -1) counts[c]++; }
      document.querySelectorAll('.count-badge').forEach(badge => {
        const color = parseInt(badge.dataset.color);
        const n = counts[color];
        badge.textContent = COLOR_NAMES[color] + ': ' + n + '/4';
        badge.classList.toggle('complete', n === 4);
      });
      updateSolveButton();
      updateContextBorders();
    }

    // Neighbor facelet indices for context border strips — all 6 faces.
    // For each face: t=top strip [left,right], b=bot strip [left,right],
    // l=left strip [top,bot], r=right strip [top,bot]
    const F_CTX = { t:[2,3],   b:[12,13], l:[17,19], r:[4,6]   };
    const R_CTX = { t:[3,1],   b:[13,15], l:[9,11],  r:[20,22]  };
    const B_CTX = { t:[1,0],   b:[15,14], l:[5,7],   r:[16,18]  };
    const L_CTX = { t:[0,2],   b:[14,12], l:[21,23], r:[8,10]   };
    const U_CTX = { t:[21,20], b:[8,9],   l:[16,17], r:[5,4]    };
    const D_CTX = { t:[10,11], b:[23,22], l:[19,18], r:[6,7]    };

    function updateContextBorders() {
      const set = (id, fi) => {
        const el = document.getElementById(id);
        if (!el) return;
        const col = facelets[fi];
        el.style.background = col === -1 ? '' : COLOR_CSS[col];
      };
      for (const [face, ctx] of [['F',F_CTX],['R',R_CTX],['B',B_CTX],['L',L_CTX],['U',U_CTX],['D',D_CTX]]) {
        set(`ctx-${face}-t0`, ctx.t[0]); set(`ctx-${face}-t1`, ctx.t[1]);
        set(`ctx-${face}-b0`, ctx.b[0]); set(`ctx-${face}-b1`, ctx.b[1]);
        set(`ctx-${face}-l0`, ctx.l[0]); set(`ctx-${face}-l1`, ctx.l[1]);
        set(`ctx-${face}-r0`, ctx.r[0]); set(`ctx-${face}-r1`, ctx.r[1]);
      }
    }

    function updateSolveButton() {
      // Solve is triggered via the face-nav button; update its enabled state
      const allPainted = facelets.every(c => c !== -1);
      const counts = new Array(6).fill(0);
      for (const col of facelets) { if (col !== -1) counts[col]++; }
      const allValid = counts.every(n => n === 4);
      const btn = document.getElementById('btn-face-next');
      if (currentFaceIdx === 5) {
        btn.disabled = !(solverReady && allPainted && allValid);
      }
    }

    // =========================================================================
    // VALIDATION
    // =========================================================================

    function validateFacelets(facelets) {
      const counts = new Array(6).fill(0);
      for (const c of facelets) counts[c]++;
      for (let c = 0; c < 6; c++) {
        if (counts[c] !== 4)
          return `${COLOR_NAMES[c]} appears ${counts[c]} time${counts[c] === 1 ? '' : 's'} (need exactly 4).`;
      }
      return null;
    }

    function validateCubie(cp, co) {
      // All 8 cubies must be present exactly once
      const seen = new Array(8).fill(false);
      for (let i = 0; i < 8; i++) {
        if (cp[i] < 0 || cp[i] > 7 || seen[cp[i]])
          return 'Invalid corner combination — check that each corner cubie appears exactly once.';
        seen[cp[i]] = true;
      }

      // UFL (position 1) must be the white-red-blue cubie, correctly oriented
      if (cp[1] !== 1)
        return 'The white logo corner does not appear to be at the front top left. ' +
               'Please check your color entry and try again.';
      if (co[1] !== 0)
        return 'The front top left corner looks twisted. ' +
               'Make sure white faces front, red faces top, and blue faces left.';

      if (co.reduce((a, b) => a + b, 0) % 3 !== 0)
        return 'Invalid corner orientation — one or more corners may be incorrectly entered.';

      return null;
    }

    // =========================================================================
    // SOLVE BUTTON
    // =========================================================================

    function setStatus(msg, isError = true) {
      const el = document.getElementById('status-msg');
      el.textContent = msg;
      el.style.color = isError ? '#ff8080' : '#90caf9';
    }

    // =========================================================================
    // FACE CAROUSEL
    // =========================================================================

    const FACE_ORDER  = ['F', 'R', 'B', 'L', 'U', 'D'];
    const FACE_LABELS = ['Front Side', 'Right Side', 'Back Side', 'Left Side', 'Top Side', 'Bottom Side'];
    const FACE_INSTRUCTIONS = [
      '<strong>Before you start:</strong> Hold the cube so the white logo faces you in the upper-left corner. Fill in the <strong>Front Side</strong> — the logo square is already locked in.',
      'Rotate the cube to see the <strong>Right Side</strong>. <strong>Tap</strong> a square to cycle colors, or <strong>hold</strong> to open the color picker.',
      'Fill in the <strong>Back Side</strong> — the face opposite the white logo.',
      'Fill in the <strong>Left Side</strong>.',
      'Fill in the <strong>Top Side</strong>.',
      'Fill in the <strong>Bottom Side</strong>, then tap <strong>Solve</strong> when you\'re ready.',
    ];

    // 2D slide transition between faces.
    // dx/dy = direction of the sweep (-1=left/up, +1=right/down).
    // edgeCells = the two cell indices (0-3) whose colors flow into the neighbor strip.
    // stripSuffix = which strip side on the destination face they land on ('l' or 'r').
    const TRANSITIONS = {
      '0-1': { dx: -1, dy:  0, edgeCells: [1,3], stripSuffix: 'l' },  // F→R
      '1-2': { dx: -1, dy:  0, edgeCells: [1,3], stripSuffix: 'l' },  // R→B
      '2-3': { dx: -1, dy:  0, edgeCells: [1,3], stripSuffix: 'l' },  // B→L
      '1-0': { dx:  1, dy:  0, edgeCells: [0,2], stripSuffix: 'r' },  // R→F
      '2-1': { dx:  1, dy:  0, edgeCells: [0,2], stripSuffix: 'r' },  // B→R
      '3-2': { dx:  1, dy:  0, edgeCells: [0,2], stripSuffix: 'r' },  // L→B
      // Two-step intermediates (L↔U and U↔D via Front)
      '3-0': { dx: -1, dy:  0, edgeCells: null,  stripSuffix: null }, // L→F (step 1 of L→U): Front from right
      '0-4': { dx:  0, dy:  1, edgeCells: null,  stripSuffix: null }, // F→U (step 2 of L→U): Front exits down
      '4-0': { dx:  0, dy: -1, edgeCells: null,  stripSuffix: null }, // U→F (step 1 of U→L/U→D): Top exits up
      '0-3': { dx:  1, dy:  0, edgeCells: null,  stripSuffix: null }, // F→L (step 2 of U→L): Front exits right
      '0-5': { dx:  0, dy: -1, edgeCells: null,  stripSuffix: null }, // F→D (step 2 of U→D): Front exits up
      '5-0': { dx:  0, dy:  1, edgeCells: null,  stripSuffix: null }, // D→F (step 1 of D→U): Bottom exits down
    };

    let currentFaceIdx = 0;
    let appMode = 'input'; // 'input' | 'solution'

    function activateFace(idx) {
      currentFaceIdx = idx;
      [...FACE_ORDER, 'SOL'].forEach(f =>
        document.getElementById(`face-section-${f}`).classList.remove('active'));
      document.getElementById(`face-section-${FACE_ORDER[idx]}`).classList.add('active');
      document.getElementById('face-indicator').textContent =
        `Face ${idx + 1} of 6 \u2014 ${FACE_LABELS[idx]}`;
      document.getElementById('instructions').innerHTML = FACE_INSTRUCTIONS[idx];
      document.getElementById('btn-face-prev').disabled = idx === 0;
      const nextBtn = document.getElementById('btn-face-next');
      if (idx === 5) {
        nextBtn.textContent = 'Solve';
        nextBtn.classList.add('solve-mode');
        updateSolveButton();
      } else {
        nextBtn.textContent = 'Next \u2192';
        nextBtn.classList.remove('solve-mode');
        nextBtn.disabled = false;
      }
    }

    function showFace(idx) { activateFace(idx); }

    function animateFaceTransition(fromIdx, toIdx, dur) {
      // Two-step: L→U goes via Front (Front from right, then Front exits down to Top)
      if (fromIdx === 3 && toIdx === 4) {
        animateFaceTransition(3, 0, 360);
        setTimeout(() => animateFaceTransition(0, 4, 360), 420);
        return;
      }
      // Two-step: U→L goes via Front (Top exits up to Front, then Front exits right to Left)
      if (fromIdx === 4 && toIdx === 3) {
        animateFaceTransition(4, 0, 360);
        setTimeout(() => animateFaceTransition(0, 3, 360), 420);
        return;
      }
      // Two-step: U→D goes via Front (Top exits up to Front, then Front exits up to Bottom)
      if (fromIdx === 4 && toIdx === 5) {
        animateFaceTransition(4, 0, 360);
        setTimeout(() => animateFaceTransition(0, 5, 360), 420);
        return;
      }
      // Two-step: D→U goes via Front (Bottom exits down to Front, then Front exits down to Top)
      if (fromIdx === 5 && toIdx === 4) {
        animateFaceTransition(5, 0, 360);
        setTimeout(() => animateFaceTransition(0, 4, 360), 420);
        return;
      }

      const key = `${fromIdx}-${toIdx}`;
      const tr  = TRANSITIONS[key];
      if (!tr) { activateFace(toIdx); return; }

      const fromFace = FACE_ORDER[fromIdx];
      const toFace   = FACE_ORDER[toIdx];
      const DUR = dur || 360;

      // 1. Snapshot the old face cells (position + colour) before any DOM change
      const faceEl   = document.getElementById(`face-${fromFace}`);
      const faceRect = faceEl.getBoundingClientRect();
      const cellData = [];
      faceEl.querySelectorAll('.facelet').forEach((cell, i) => {
        cellData.push({
          r:      cell.getBoundingClientRect(),
          bg:     getComputedStyle(cell).backgroundColor,
          isEdge: tr.edgeCells ? tr.edgeCells.includes(i) : false,
        });
      });

      // 2. Switch to the new face (natural layout position, no animation yet)
      activateFace(toIdx);

      // 3. Measure context-strip targets NOW — before any transform animations start
      //    (getBoundingClientRect reflects WAAPI transforms; measure before animate() calls)
      let stripRects = null;
      if (tr.edgeCells && tr.stripSuffix) {
        const s0 = document.getElementById(`ctx-${toFace}-${tr.stripSuffix}0`);
        const s1 = document.getElementById(`ctx-${toFace}-${tr.stripSuffix}1`);
        if (s0 && s1) stripRects = [s0.getBoundingClientRect(), s1.getBoundingClientRect()];
      }

      // 4. Slide the new face section in from the opposite direction.
      //    Use viewport units so it starts truly off-screen, then lands at natural position.
      const newSection = document.getElementById(`face-section-${toFace}`);
      // dx=-1 (compress left)  → old exits LEFT,  new face comes from right → start at +vw offset
      // dx=+1 (compress right) → old exits RIGHT, new face comes from left  → start at -vw offset
      // dy=-1 (compress up)    → old exits UP,    new face comes from below → start at +vh offset
      // dy=+1 (compress down)  → old exits DOWN,  new face comes from above → start at -vh offset
      const slideX = tr.dx !== 0 ? -tr.dx * window.innerWidth  * 0.65 : 0;
      const slideY = tr.dy !== 0 ? -tr.dy * window.innerHeight * 0.45 : 0;
      newSection.animate(
        [
          { transform: `translate(${slideX}px,${slideY}px)`, opacity: 0.2 },
          { transform: 'translate(0,0)',                      opacity: 1   },
        ],
        { duration: DUR, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' }
      );

      // 5. Animate ghost cells over the departing face
      let edgeCount = 0;
      cellData.forEach(cd => {
        const g = document.createElement('div');
        g.style.cssText =
          `position:fixed;left:${cd.r.left}px;top:${cd.r.top}px;` +
          `width:${cd.r.width}px;height:${cd.r.height}px;` +
          `background:${cd.bg};border-radius:5px;` +
          `z-index:9999;pointer-events:none;will-change:transform,opacity;`;
        document.body.appendChild(g);

        if (cd.isEdge && stripRects) {
          // Edge cell → morph into the context-strip rectangle.
          // Translate the element's centre to the strip's centre, then scale to strip size.
          const sr  = stripRects[edgeCount++];
          const tx  = (sr.left + sr.width  / 2) - (cd.r.left + cd.r.width  / 2);
          const ty  = (sr.top  + sr.height / 2) - (cd.r.top  + cd.r.height / 2);
          const scx = sr.width  / cd.r.width;
          const scy = sr.height / cd.r.height;
          g.animate(
            [
              { transform: 'translate(0,0) scale(1,1)',                                  opacity: 1 },
              { transform: `translate(${tx}px,${ty}px) scale(${scx},${scy})`, opacity: 0 },
            ],
            { duration: DUR, easing: 'cubic-bezier(0.4,0,0.2,1)', fill: 'forwards' }
          );
        } else {
          // Non-edge cell → compress toward the sweep direction and fade out.
          // Travel ≈ 85 % of one face-width so it stays near the face area.
          const endTX = tr.dx * faceRect.width  * 0.85;
          const endTY = tr.dy * faceRect.height * 1.8;
          const scx   = tr.dx !== 0 ? 0.04 : 1;   // collapse horizontally for H sweeps
          const scy   = tr.dy !== 0 ? 0.04 : 1;   // collapse vertically   for V sweeps
          g.animate(
            [
              { transform: 'translate(0,0) scale(1,1)',                                  opacity: 1 },
              { transform: `translate(${endTX}px,${endTY}px) scale(${scx},${scy})`, opacity: 0 },
            ],
            { duration: DUR, easing: 'cubic-bezier(0.4,0,0.8,1)', fill: 'forwards' }
          );
        }
        setTimeout(() => g.remove(), DUR + 60);
      });
    }

    function showFace(idx) {
      currentFaceIdx = idx;
      FACE_ORDER.forEach(f => {
        document.getElementById(`face-section-${f}`).classList.remove('active');
      });
      document.getElementById(`face-section-${FACE_ORDER[idx]}`).classList.add('active');
      document.getElementById('face-indicator').textContent =
        `Face ${idx + 1} of 6 \u2014 ${FACE_LABELS[idx]}`;
      document.getElementById('instructions').innerHTML = FACE_INSTRUCTIONS[idx];
      document.getElementById('btn-face-prev').disabled = idx === 0;
      const nextBtn = document.getElementById('btn-face-next');
      if (idx === 5) {
        nextBtn.textContent = 'Solve';
        nextBtn.classList.add('solve-mode');
        updateSolveButton();
      } else {
        nextBtn.textContent = 'Next \u2192';
        nextBtn.classList.remove('solve-mode');
        nextBtn.disabled = false;
      }
    }

    document.getElementById('btn-face-prev').addEventListener('click', () => {
      if (appMode === 'solution') {
        if (currentStep > 0) highlightStep(currentStep - 1);
      } else {
        if (currentFaceIdx > 0) animateFaceTransition(currentFaceIdx, currentFaceIdx - 1);
      }
    });

    document.getElementById('btn-face-next').addEventListener('click', () => {
      if (appMode === 'solution') {
        if (currentStep < totalSteps - 1) highlightStep(currentStep + 1);
        else launchConfetti();
      } else {
        if (currentFaceIdx < 5) animateFaceTransition(currentFaceIdx, currentFaceIdx + 1);
        else triggerSolve();
      }
    });

    // =========================================================================
    // SOLVE
    // =========================================================================

    function triggerSolve() {
      setStatus('');
      document.getElementById('solution-section').hidden = true;

      const faceletError = validateFacelets(facelets);
      if (faceletError) { setStatus(faceletError); return; }

      const { cp, co } = faceletsToCubie(facelets);

      const cubieError = validateCubie(cp, co);
      if (cubieError) { setStatus(cubieError); return; }

      const moves = solve(cp, co);
      if (moves === null) { setStatus('No solution found — please check your cube state.'); return; }

      renderSolution(moves);
    }

    // =========================================================================
    // SOLUTION DISPLAY — single step at a time
    // =========================================================================

    let currentStep   = -1;
    let totalSteps    = 0;
    let solutionMoves = [];
    let snapshots     = [];

    // Large step SVG: 2×2 face grid + edge strips + mini Front icon + arrow (234×234 viewBox)
    // face index: 0=R (facelets 4-7), 1=D (facelets 12-15), 2=B (facelets 20-23)
    function createStepSVG(m, faceletColors) {
      const face  = Math.floor(m / 3);
      const power = m % 3;              // 0=CW, 1=180°, 2=CCW

      const base = [4, 12, 20][face];  // R→4, D→12, B→20
      const c = [0, 1, 2, 3].map(k => COLOR_CSS[faceletColors[base + k]]);
      const aw = '#ffffff';

      // Neighboring sticker facelets on each edge of the rotated face.
      // t=top[TL,TR], b=bottom[BL,BR], l=left[top,bot], r=right[top,bot]
      const EDGE_IDX = [
        { t:[3,1],   b:[13,15], l:[9,11],  r:[20,22] },  // R: top=U, bot=D, left=F, right=B
        { t:[10,11], b:[23,22], l:[19,18], r:[6,7]   },  // D: top=F, bot=B, left=L, right=R
        { t:[1,0],   b:[15,14], l:[5,7],   r:[16,18] },  // B: top=U, bot=D, left=R, right=L
      ];
      const ei = EDGE_IDX[face];
      const et = ei.t.map(i => COLOR_CSS[faceletColors[i]]);
      const eb = ei.b.map(i => COLOR_CSS[faceletColors[i]]);
      const el = ei.l.map(i => COLOR_CSS[faceletColors[i]]);
      const er = ei.r.map(i => COLOR_CSS[faceletColors[i]]);

      // Thin colored strips just outside the face grid (4px gap, 9px thick)
      const edgeStrips =
        `<rect x="72"  y="59"  width="42" height="9" rx="2" fill="${et[0]}"/>` +
        `<rect x="120" y="59"  width="42" height="9" rx="2" fill="${et[1]}"/>` +
        `<rect x="72"  y="166" width="42" height="9" rx="2" fill="${eb[0]}"/>` +
        `<rect x="120" y="166" width="42" height="9" rx="2" fill="${eb[1]}"/>` +
        `<rect x="59"  y="72"  width="9" height="42" rx="2" fill="${el[0]}"/>` +
        `<rect x="59"  y="120" width="9" height="42" rx="2" fill="${el[1]}"/>` +
        `<rect x="166" y="72"  width="9" height="42" rx="2" fill="${er[0]}"/>` +
        `<rect x="166" y="120" width="9" height="42" rx="2" fill="${er[1]}"/>`;

      // Rotation angle: 90° CW, 180°, or -90° CCW around face centre (117,117)
      const deg = power === 0 ? 90 : power === 2 ? -90 : 180;
      const aVals = `0 117 117; 0 117 117; ${deg} 117 117; ${deg} 117 117; 0 117 117`;

      // Animated face group: squares + border strips rotate as a unit
      const faceGroup =
        `<g>` +
        `<animateTransform attributeName="transform" type="rotate"` +
        ` values="${aVals}" keyTimes="0;0.30;0.65;0.92;1"` +
        ` dur="3.2s" repeatCount="indefinite"` +
        ` calcMode="spline" keySplines="0 0 1 1;0.42 0 0.58 1;0 0 1 1;0 0 1 1"/>` +
        edgeStrips +
        `<rect x="72"  y="72"  width="42" height="42" rx="4" fill="${c[0]}"/>` +
        `<rect x="120" y="72"  width="42" height="42" rx="4" fill="${c[1]}"/>` +
        `<rect x="72"  y="120" width="42" height="42" rx="4" fill="${c[2]}"/>` +
        `<rect x="120" y="120" width="42" height="42" rx="4" fill="${c[3]}"/>` +
        `<rect x="72" y="72" width="90" height="90" rx="3" fill="none" stroke="${aw}" stroke-width="1" opacity="0.15"/>` +
        `</g>`;

      // Mini Front Side icon — upper-right corner (safe from all arrow paths)
      const mx = 191, my = 19, mc = 16, mg = 3;
      const fc = [8, 9, 10, 11].map(i => COLOR_CSS[faceletColors[i]]);
      const frontMini =
        `<rect x="185" y="6" width="46" height="52" rx="4" fill="rgba(0,0,0,0.4)"/>` +
        `<text x="208" y="16" font-size="7" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="sans-serif" font-weight="bold" letter-spacing="0.5">FRONT</text>` +
        `<rect x="${mx}"       y="${my}"       width="${mc}" height="${mc}" rx="2" fill="${fc[0]}"/>` +
        `<rect x="${mx+mc+mg}" y="${my}"       width="${mc}" height="${mc}" rx="2" fill="${fc[1]}"/>` +
        `<rect x="${mx}"       y="${my+mc+mg}" width="${mc}" height="${mc}" rx="2" fill="${fc[2]}"/>` +
        `<rect x="${mx+mc+mg}" y="${my+mc+mg}" width="${mc}" height="${mc}" rx="2" fill="${fc[3]}"/>` +
        `<circle cx="${mx+5}" cy="${my+5}" r="3" fill="rgba(0,0,0,0.45)"/>`;

      // Direction arc + arrowhead (dimmed — animation already conveys direction)
      let arrow;
      if (power === 0) {
        arrow =
          `<path d="M 117 33 A 84 84 0 1 1 33 117" fill="none" stroke="${aw}" stroke-width="6" stroke-linecap="round" opacity="0.4"/>` +
          `<polygon points="33,96 21,120 45,120" fill="${aw}" opacity="0.4"/>`;
      } else if (power === 2) {
        arrow =
          `<path d="M 117 33 A 84 84 0 1 0 201 117" fill="none" stroke="${aw}" stroke-width="6" stroke-linecap="round" opacity="0.4"/>` +
          `<polygon points="201,96 189,120 213,120" fill="${aw}" opacity="0.4"/>`;
      } else {
        arrow =
          `<path d="M 117 33 A 84 84 0 0 1 117 201" fill="none" stroke="${aw}" stroke-width="6" stroke-linecap="round" opacity="0.4"/>` +
          `<polygon points="93,201 117,189 117,213" fill="${aw}" opacity="0.4"/>`;
      }

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 234 234');
      svg.setAttribute('aria-hidden', 'true');
      svg.innerHTML = faceGroup + frontMini + arrow;
      return svg;
    }

    function renderSolution(moves) {
      solutionMoves = moves;
      totalSteps    = moves.length;

      const { cp: cp0, co: co0 } = faceletsToCubie(facelets);
      snapshots = [];
      let curCp = cp0.slice(), curCo = co0.slice();
      for (let i = 0; i < moves.length; i++) {
        snapshots.push(cubieToFacelets(curCp, curCo));
        const res = applyMove(curCp, curCo, MOVES[moves[i]].cp, MOVES[moves[i]].co);
        curCp = res.cp; curCo = res.co;
      }

      appMode = 'solution';

      // Hide all face-input sections, show the solution display
      [...FACE_ORDER, 'SOL'].forEach(f => {
        document.getElementById(`face-section-${f}`).classList.remove('active');
      });
      document.getElementById('face-section-SOL').classList.add('active');

      if (moves.length === 0) {
        document.getElementById('instructions').innerHTML = '<strong>Your cube is already solved!</strong>';
        document.getElementById('face-indicator').textContent = 'Solved!';
        document.getElementById('btn-face-prev').disabled = true;
        document.getElementById('btn-face-next').disabled = true;
      } else {
        document.getElementById('instructions').innerHTML =
          `Solved in <strong>${moves.length} move${moves.length === 1 ? '' : 's'}</strong>. Follow the steps below:`;
        highlightStep(0);
      }
    }

    function highlightStep(step) {
      currentStep = step;
      const m    = solutionMoves[step];
      const face = Math.floor(m / 3);

      document.getElementById('step-face-name').textContent = FACE_NAMES[face];

      const visual = document.getElementById('step-visual');
      visual.innerHTML = '';
      visual.appendChild(createStepSVG(m, snapshots[step]));

      document.getElementById('step-instruction').textContent = MOVE_DESCS[m];
      document.getElementById('face-indicator').textContent   = `Step ${step + 1} of ${totalSteps}`;

      document.getElementById('btn-face-prev').disabled = step <= 0;
      const nextBtn = document.getElementById('btn-face-next');
      nextBtn.classList.remove('solve-mode');
      nextBtn.disabled = false;
      nextBtn.textContent = step >= totalSteps - 1 ? 'Done \u2728' : 'Next \u2192';
    }

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentStep > 0) highlightStep(currentStep - 1);
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentStep < totalSteps - 1) highlightStep(currentStep + 1);
    });

    // =========================================================================
    // CONFETTI
    // =========================================================================

    function launchConfetti() {
      const COLORS = [
        '#ffffff','#009b48','#c41e3a','#0051a2','#ff5800','#ffd500',
        '#ff6b6b','#ffd700','#6bcb77','#4d96ff','#cc5de8','#20c997',
      ];

      // ── Phase 1: spin the solution content that's currently on screen ──────
      const sol  = document.getElementById('face-section-SOL');
      const rect = sol.getBoundingClientRect();
      const cx   = rect.left + rect.width  / 2;
      const cy   = rect.top  + rect.height / 2;

      const SPIN_DUR = 620;

      // 3 full rotations, slight scale-up build
      sol.animate(
        [
          { transform: 'scale(1)    rotate(0deg)',    opacity: 1 },
          { transform: 'scale(1.08) rotate(1080deg)', opacity: 1 },
        ],
        { duration: SPIN_DUR, easing: 'cubic-bezier(0.2,0,0.85,1)', fill: 'forwards' }
      );

      // ── Phase 2: explode outward, then rain confetti ───────────────────────
      setTimeout(() => {
        sol.animate(
          [
            { transform: 'scale(1.08) rotate(1080deg)', opacity: 1 },
            { transform: 'scale(4.5)  rotate(1200deg)', opacity: 0 },
          ],
          { duration: 280, easing: 'cubic-bezier(0.2,0,0.3,1)', fill: 'forwards' }
        );

        // 80 pieces burst outward from the explosion centre, then fall slowly
        const N = 80;
        for (let i = 0; i < N; i++) {
          const el    = document.createElement('div');
          const color = COLORS[i % COLORS.length];
          const w     = 6  + Math.random() * 6;
          const h     = 9  + Math.random() * 8;
          const delay = Math.random() * 180;
          const dur   = 3200 + Math.random() * 1600;  // slow fall: 3.2–4.8 s

          el.style.cssText =
            `position:fixed;left:${cx - w/2}px;top:${cy}px;` +
            `width:${w}px;height:${h}px;` +
            `background:${color};border-radius:2px;` +
            `z-index:10000;pointer-events:none;will-change:transform,opacity;`;
          el.className = 'confetti-piece';
          document.body.appendChild(el);

          // Each piece: radial burst → gravity arc → fade
          const angle  = Math.random() * Math.PI * 2;
          const speed  = 80  + Math.random() * 200;
          const ex     = Math.cos(angle) * speed;
          const ey     = Math.sin(angle) * speed;
          const finalX = ex  + (Math.random() - 0.5) * 160;
          const finalY = ey  + window.innerHeight * 0.72 + Math.random() * window.innerHeight * 0.22;
          const rotate = (Math.random() - 0.5) * 1080;

          el.animate(
            [
              { transform: `translate(0,0) rotate(0deg)`,
                opacity: 1 },
              { transform: `translate(${ex}px,${ey}px) rotate(${rotate * 0.35}deg)`,
                opacity: 1, offset: 0.22 },
              { transform: `translate(${finalX}px,${finalY}px) rotate(${rotate}deg)`,
                opacity: 0 },
            ],
            { duration: dur, delay, easing: 'cubic-bezier(0.12,0.9,0.4,1)', fill: 'forwards' }
          );

          setTimeout(() => el.remove(), dur + delay + 80);
        }
      }, SPIN_DUR + 20);
    }

    // =========================================================================
    // RESET
    // =========================================================================

    document.getElementById('reset-btn').addEventListener('click', () => {
      // Clear any in-flight confetti pieces
      document.querySelectorAll('.confetti-piece').forEach(el => el.remove());
      // Cancel spin/explode animation held on the solution section
      document.getElementById('face-section-SOL').getAnimations().forEach(a => a.cancel());
      facelets.fill(-1);
      facelets[LOGO_FACELET] = 0;
      document.querySelectorAll('.facelet').forEach(cell => {
        const idx = parseInt(cell.dataset.index);
        if (idx === LOGO_FACELET) return;
        cell.style.background  = '';
        cell.style.borderColor = '';
      });
      document.getElementById('solution-section').hidden = true;
      setStatus('');
      appMode = 'input';
      showFace(0);
      updateCounts();
    });

    // =========================================================================
    // SWIPE GESTURES
    // =========================================================================

    function attachSwipe(el, onLeft, onRight) {
      let startX = 0;
      el.addEventListener('touchstart', e => {
        startX = e.changedTouches[0].clientX;
      }, { passive: true });
      el.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) < 50) return;
        if (dx < 0) onLeft(); else onRight();
      }, { passive: true });
    }

    // =========================================================================
    // BOOT
    // =========================================================================

    window.addEventListener('load', () => {
      initSolver();
      initLogoFacelet();
      showFace(0);

      attachSwipe(
        document.getElementById('cube-net'),
        () => {
          if (appMode === 'solution') {
            if (currentStep < totalSteps - 1) highlightStep(currentStep + 1);
          } else {
            if (currentFaceIdx < 5) animateFaceTransition(currentFaceIdx, currentFaceIdx + 1);
            else triggerSolve();
          }
        },
        () => {
          if (appMode === 'solution') {
            if (currentStep > 0) highlightStep(currentStep - 1);
          } else {
            if (currentFaceIdx > 0) animateFaceTransition(currentFaceIdx, currentFaceIdx - 1);
          }
        }
      );

    });

  </script>
